services:
  app:
    build:
      context: .
      # args:
      #   - HTTP_PROXY=http://host.docker.internal:20122
      #   - HTTPS_PROXY=http://host.docker.internal:20122
      #   - NO_PROXY=localhost,127.0.0.1
    image: gpt-image-web:local
    container_name: gpt-image-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      CHATGPT2API_AUTH_KEY: ${CHATGPT2API_AUTH_KEY:-change-me-admin-key}
      CHATGPT2API_ADMIN_EMAIL: ${CHATGPT2API_ADMIN_EMAIL:-admin@example.com}
      CHATGPT2API_ADMIN_PASSWORD: ${CHATGPT2API_ADMIN_PASSWORD:-change-me-admin-password}
      CHATGPT2API_SESSION_SECRET: ${CHATGPT2API_SESSION_SECRET:-change-me-session-secret}
      CHATGPT2API_ALLOW_REGISTRATION: ${CHATGPT2API_ALLOW_REGISTRATION:-false}
      CHATGPT2API_PROXY_URL: ${CHATGPT2API_PROXY_URL:-}
      CHATGPT2API_BASE_URL: ${CHATGPT2API_BASE_URL:-}
      CHATGPT2API_LOG_LEVEL: ${CHATGPT2API_LOG_LEVEL:-info}
      TZ: ${TZ:-Asia/Shanghai}
      CHATGPT2API_IMAGES_DIR: /app/data/images
      CHATGPT2API_BACKUPS_DIR: /app/data/backups
      CHATGPT2API_CORS_ALLOWED_ORIGINS: ${CHATGPT2API_CORS_ALLOWED_ORIGINS:-}
      CHATGPT2API_MAX_REQUEST_BODY_MB: ${CHATGPT2API_MAX_REQUEST_BODY_MB:-80}
      CHATGPT2API_LOGIN_RATE_LIMIT_MAX: ${CHATGPT2API_LOGIN_RATE_LIMIT_MAX:-8}
      CHATGPT2API_LOGIN_RATE_LIMIT_WINDOW_SECONDS: ${CHATGPT2API_LOGIN_RATE_LIMIT_WINDOW_SECONDS:-300}
